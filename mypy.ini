[mypy]
python_version = 3.10
plugins = mypy_django_plugin.main, mypy_drf_plugin.main
# Django/DRF no siempre exponen stubs/py.typed; evitamos ruido para que el gate sea útil.
disable_error_code = import-untyped
ignore_missing_imports = True

# Mantener señal de calidad sin bloquear por tipado perfecto en Django.
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = False

# Limitar el análisis a nuestro código; excluir migraciones y artefactos.
exclude = (^login_module/src/apps/.*/migrations/.*$)|(^login_module/src/apps/audit/services\.py$)

# Asegura que imports desde "config" y "apps" resuelvan.
mypy_path = login_module/src

[mypy.plugins.django-stubs]
django_settings_module = config.settings.dev
