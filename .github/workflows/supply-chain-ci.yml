name: Supply Chain CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: supply-chain-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements/base.txt
            requirements/prod.txt

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Generate backend SBOM + pip audit
        run: |
          python -m pip install --upgrade pip
          pip install cyclonedx-bom pip-audit
          cyclonedx-py requirements requirements/base.txt --output-format json --output-file qa_sbom_backend.json
          pip-audit -r requirements/base.txt -r requirements/prod.txt -f json -o qa_pip_audit_u6.json || true

      - name: Generate frontend SBOM + npm audit
        working-directory: frontend
        run: |
          npm ci --ignore-scripts --no-fund --no-audit
          npm audit --json > ../qa_npm_audit_u6.json || true
          npx --yes @cyclonedx/cyclonedx-npm --output-file ../qa_sbom_frontend.json

      - name: Validate security exceptions contract
        run: |
          python3 qa/validate_security_exceptions.py \
            --root . \
            --contract qa/contracts/security_exceptions.json \
            --output qa_security_exceptions_guard_u6.json

      - name: Enforce security findings policy
        run: |
          python3 qa/enforce_security_findings.py \
            --root . \
            --pip-report qa_pip_audit_u6.json \
            --npm-report qa_npm_audit_u6.json \
            --exceptions qa/contracts/security_exceptions.json \
            --output qa_security_findings_guard_u6.json

      - name: Build integrity manifest
        run: |
          sha256sum \
            qa_sbom_backend.json \
            qa_sbom_frontend.json \
            qa_pip_audit_u6.json \
            qa_npm_audit_u6.json \
            qa_security_exceptions_guard_u6.json \
            qa_security_findings_guard_u6.json \
            > qa_supply_chain_artifacts.sha256

      - name: Upload supply-chain reports
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: supply-chain-reports
          path: |
            qa_sbom_backend.json
            qa_sbom_frontend.json
            qa_pip_audit_u6.json
            qa_npm_audit_u6.json
            qa_security_exceptions_guard_u6.json
            qa_security_findings_guard_u6.json
            qa_supply_chain_artifacts.sha256
          if-no-files-found: error
