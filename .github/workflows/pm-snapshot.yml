name: PM Snapshot

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # diario 03:00 UTC

concurrency:
  group: pm-snapshot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements/base.txt
            requirements/dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      # QA (captura aunque falle)
      - name: QA - ruff
        id: qa_ruff
        continue-on-error: true
        run: |
          set -o pipefail
          ruff check . | tee qa_ruff.txt

      - name: QA - pytest + coverage
        id: qa_pytest
        continue-on-error: true
        working-directory: login_module
        run: |
          set -o pipefail
          coverage run -m pytest -q --maxfail=1 --disable-warnings | tee ../qa_pytest.txt
          coverage report | tee ../qa_coverage.txt

      - name: QA - django checks
        id: qa_django
        continue-on-error: true
        working-directory: login_module
        run: |
          set -o pipefail
          python manage.py check | tee ../qa_django_check.txt
          python manage.py makemigrations --check --dry-run | tee ../qa_makemigrations_check.txt

      - name: QA - write outcomes
        if: always()
        run: |
          {
            echo "qa_ruff_outcome=${{ steps.qa_ruff.outcome }}";
            echo "qa_pytest_outcome=${{ steps.qa_pytest.outcome }}";
            echo "qa_django_outcome=${{ steps.qa_django.outcome }}";
          } > qa_outcomes.txt

      - name: Generate PM snapshot
        env:
          PM_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PM_PR_URL: ${{ github.event.pull_request.html_url || '' }}
          PM_BASE_REF: ${{ github.event.pull_request.base.ref || '' }}
          PM_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PM_HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
          PM_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          bash scripts/pm_snapshot.sh

      - name: Publish snapshot to job summary (truncated)
        if: always()
        run: |
          echo "## PM Snapshot" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          sed -n '1,220p' pm_snapshot.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_(Truncated. Descarga el artefacto **pm-snapshot** para el archivo completo.)_" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: pm-snapshot
          path: |
            pm_snapshot.md
            qa_ruff.txt
            qa_pytest.txt
            qa_coverage.txt
            qa_django_check.txt
            qa_makemigrations_check.txt
            qa_outcomes.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upsert PR comment (PM snapshot)
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- PM_SNAPSHOT -->';

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const prUrl = context.payload.pull_request.html_url;

            const raw = fs.existsSync('pm_snapshot.md') ? fs.readFileSync('pm_snapshot.md', 'utf8') : '';
            const max = 10000; // evitar límites / ruido
            const snippet = raw.length > max ? raw.slice(0, max) + '\n\n_(Truncated)_\n' : raw;

            const body = [
              marker,
              'PM Snapshot (auto-actualizado).',
              '',
              `- PR: ${prUrl}`,
              `- Run: ${runUrl}`,
              '',
              '<details><summary>Snapshot</summary>',
              '',
              '```md',
              snippet,
              '```',
              '',
              '</details>',
              '',
              'Artefacto: **pm-snapshot** (pm_snapshot.md) en este run.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }
