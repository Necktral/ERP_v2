name: Security CI (Blocking)

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: security-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITLEAKS_IMAGE: zricethezav/gitleaks:latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Secret scan (gitleaks)
        run: |
          pull_ok=0
          for attempt in 1 2 3; do
            if docker pull "$GITLEAKS_IMAGE"; then
              pull_ok=1
              break
            fi
            echo "gitleaks image pull failed (attempt $attempt/3), retrying..."
            sleep $((attempt * 3))
          done
          if [ "$pull_ok" -ne 1 ]; then
            echo "failed to pull $GITLEAKS_IMAGE after retries"
            exit 1
          fi

          docker run --rm -v "$PWD":/repo "$GITLEAKS_IMAGE" detect \
            --no-git \
            --source /repo \
            --config /repo/.gitleaks.toml \
            --report-format json \
            --report-path /repo/qa_gitleaks.json \
            --exit-code 1

      - name: Setup Python
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements/base.txt
            requirements/prod.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Dependency scan (pip-audit)
        run: |
          # collect-first: el bloqueo lo decide qa/enforce_security_findings.py
          pip-audit -r requirements/base.txt -r requirements/prod.txt -f json -o qa_pip_audit.json || true
          python - <<'PY'
          import json

          data = json.load(open('qa_pip_audit.json', 'r', encoding='utf-8'))
          def severity_score(vuln):
              sev = vuln.get('severity') or []
              for entry in sev:
                  score = entry.get('score') if isinstance(entry, dict) else None
                  try:
                      return float(score)
                  except (TypeError, ValueError):
                      continue
              return 0.0

          def is_high_or_critical(vuln):
              score = severity_score(vuln)
              return score >= 7.0

          failures = []
          for dep in data.get('dependencies', []):
              for vuln in dep.get('vulns', []):
                  fix_versions = vuln.get('fix_versions') or []
                  if fix_versions and is_high_or_critical(vuln):
                      failures.append((dep.get('name'), vuln.get('id'), fix_versions))

          print(f'pip-audit findings high/critical+fix: {len(failures)}')
          PY

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Dependency scan (npm audit)
        working-directory: frontend
        run: |
          npm install --package-lock-only --ignore-scripts --no-fund --no-audit
          # npm audit exits non-zero when any vulnerability exists; capture report first,
          # then enforce our blocking policy in the parser below.
          npm audit --json > ../qa_npm_audit.json || true
          node - <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('../qa_npm_audit.json', 'utf8'));
          const vulns = data.vulnerabilities || {};

          const failures = [];
          for (const [name, info] of Object.entries(vulns)) {
              const severity = info.severity || '';
              const fix = info.fixAvailable;
              const hasFix = !!fix && fix !== false;
              if ((severity === 'high' || severity === 'critical') && hasFix) {
                  failures.push({ name, severity, fix });
              }
          }

          console.log(`npm audit findings high/critical+fix: ${failures.length}`);
          NODE

      - name: Validate security exceptions contract
        run: |
          python3 qa/validate_security_exceptions.py \
            --root . \
            --contract qa/contracts/security_exceptions.json \
            --output qa_security_exceptions_guard.json

      - name: Enforce security findings policy
        run: |
          python3 qa/enforce_security_findings.py \
            --root . \
            --pip-report qa_pip_audit.json \
            --npm-report qa_npm_audit.json \
            --exceptions qa/contracts/security_exceptions.json \
            --output qa_security_findings_guard.json

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: security-ci-reports
          path: |
            qa_gitleaks.json
            qa_pip_audit.json
            qa_npm_audit.json
            qa_security_exceptions_guard.json
            qa_security_findings_guard.json
          if-no-files-found: warn
