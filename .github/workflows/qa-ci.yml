name: QA CI (Gates 1–3)

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: qa-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Docker info
        run: |
          docker version
          docker compose version

      - name: Prepare .env for Docker Compose
        run: |
          cp .env.example .env

      - name: Run QA gates (deterministic)
        env:
          FRONTEND_CI_HOME: /tmp/erpcrm_frontend_ci_home
          NPM_CONFIG_CACHE: /tmp/erpcrm_frontend_ci_home/.npm
        run: |
          make qa-ci-ci

      - name: Upload QA reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qa-reports
          path: qa/reports/
          if-no-files-found: warn

      - name: Backend logs (on failure)
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color --timestamps backend db | tail -n 400

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v --remove-orphans
