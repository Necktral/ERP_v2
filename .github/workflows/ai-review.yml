name: AI Review (Advisory)

on:
  pull_request:
    branches: ["master"]

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai_review_advisory:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Build PR diff (truncated)
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git diff --unified=0 "$BASE_SHA" "$HEAD_SHA" > pr.diff

          python - <<'PY'
          import pathlib

          diff_path = pathlib.Path('pr.diff')
          data = diff_path.read_text(encoding='utf-8', errors='replace')
          max_chars = 120000
          if len(data) > max_chars:
              data = data[:max_chars] + "\n\n[TRUNCATED]"
          diff_path.write_text(data, encoding='utf-8')
          PY

      - name: Setup Python (security audit)
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements/base.txt
            requirements/dev.txt

      - name: Install pip-audit
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Security - pip-audit (non-blocking)
        continue-on-error: true
        run: |
          set -o pipefail
          pip-audit -r requirements/base.txt -r requirements/dev.txt 2>&1 | tee qa_pip_audit.txt

      - name: Setup Node (security audit)
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Security - npm audit (non-blocking)
        continue-on-error: true
        working-directory: frontend
        run: |
          set -o pipefail
          npm install --package-lock-only --ignore-scripts --no-fund --no-audit
          npm audit --audit-level=high 2>&1 | tee ../qa_npm_audit.txt

      - name: Security - Trivy fs (non-blocking)
        continue-on-error: true
        # v0.35.0 pinned by commit SHA for supply-chain stability.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          format: table
          output: qa_trivy.txt
          exit-code: "0"

      - name: Security summary (non-blocking)
        if: always()
        run: |
          echo "## Security Scan (non-blocking)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f qa_pip_audit.txt ]; then
            echo "### pip-audit" >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,120p' qa_pip_audit.txt >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### pip-audit" >> "$GITHUB_STEP_SUMMARY"
            echo "(sin salida)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f qa_npm_audit.txt ]; then
            echo "### npm audit" >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,120p' qa_npm_audit.txt >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### npm audit" >> "$GITHUB_STEP_SUMMARY"
            echo "(sin salida)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f qa_trivy.txt ]; then
            echo "### trivy fs" >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,120p' qa_trivy.txt >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### trivy fs" >> "$GITHUB_STEP_SUMMARY"
            echo "(sin salida)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-reports
          path: |
            qa_pip_audit.txt
            qa_npm_audit.txt
            qa_trivy.txt
          if-no-files-found: warn

      - name: AI review (comment only)
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_REVIEW_MODEL: ${{ vars.AI_REVIEW_MODEL || 'gpt-4o-mini' }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- AI_REVIEW -->';
            const apiKey = process.env.OPENAI_API_KEY;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const prUrl = context.payload.pull_request.html_url;

            const diff = fs.existsSync('pr.diff') ? fs.readFileSync('pr.diff', 'utf8') : '';
            const files = (context.payload.pull_request.changed_files || 0);

            let body;
            if (!apiKey) {
              body = [
                marker,
                'Revisión IA: **omitida** (falta el secreto OPENAI_API_KEY).',
                '',
                `- PR: ${prUrl}`,
                `- Run: ${runUrl}`,
                '',
                'Configura el secreto **OPENAI_API_KEY** en GitHub Actions para habilitar la revisión IA.',
              ].join('\n');
            } else {
              const prompt = [
                'Eres un auditor de código senior. Devuelve un reporte breve y accionable en español.',
                '',
                'Reglas:',
                '- No bloquees merge, solo comenta.',
                '- Usa severidad: CRITICAL, HIGH, MEDIUM, LOW.',
                '- Cita archivos y líneas cuando sea posible.',
                '- Enfócate en seguridad, calidad y robustez.',
                '',
                `Contexto: PR #${prNumber} con ${files} archivos cambiados.`,
                '',
                'Diff (puede estar truncado):',
                diff || '(sin diff)'
              ].join('\n');

              const response = await fetch('https://api.openai.com/v1/responses', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${apiKey}`,
                },
                body: JSON.stringify({
                  model: process.env.AI_REVIEW_MODEL || 'gpt-4o-mini',
                  input: prompt,
                  temperature: 0.2,
                  max_output_tokens: 900,
                }),
              });

              if (!response.ok) {
                const errorText = await response.text();
                body = [
                  marker,
                  'Revisión IA: **falló** al llamar a la API.',
                  '',
                  `- PR: ${prUrl}`,
                  `- Run: ${runUrl}`,
                  '',
                  'Detalles:',
                  '```',
                  errorText.slice(0, 4000),
                  '```',
                ].join('\n');
              } else {
                const data = await response.json();
                const outputText = data.output_text || (data.output || []).map(o => {
                  if (o.content) {
                    return o.content.map(c => c.text || '').join('');
                  }
                  return '';
                }).join('\n').trim();

                body = [
                  marker,
                  'Revisión IA (comentarios, no bloqueante).',
                  '',
                  `- PR: ${prUrl}`,
                  `- Run: ${runUrl}`,
                  '',
                  '```md',
                  (outputText || 'Sin salida de la IA.').slice(0, 10000),
                  '```',
                ].join('\n');
              }
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }
