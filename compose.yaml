name: erp_crm

services:
  db:
    image: postgres:16.2-alpine
    container_name: erpcrm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Opcional (más seguro/estricto al inicializar):
      # POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile.dev
    container_name: erpcrm_backend
    restart: unless-stopped
    working_dir: /app/login_module
    env_file:
      - ./.env
    environment:
      # Dentro de Docker, el host de Postgres NO es 127.0.0.1.
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"

      # Compat (settings/legacy): algunas partes aún usan DB_*.
      DB_HOST: db
      DB_PORT: "5432"

      # (redundante pero explícito; manage.py ya setea dev)
      DJANGO_SETTINGS_MODULE: config.settings.dev

      # Para imports consistentes (tu código vive en /app/src)
      PYTHONPATH: /app/login_module/src
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    # command/entrypoint quedan definidos en la imagen (docker/entrypoint.sh)

  frontend:
    image: node:20-bullseye-slim
    container_name: erpcrm_frontend
    restart: unless-stopped
    working_dir: /app/frontend
    environment:
      # El navegador accede al backend por el puerto publicado del host.
      VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: >
      bash -lc "
        npm install &&
        npm run dev -- --host 0.0.0.0 --port 3000
      "

  # Herramienta opcional para inspeccionar DB por navegador:
  adminer:
    image: adminer:4.8.1
    container_name: erpcrm_adminer
    restart: unless-stopped
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata:
