name: erp_crm_prod

services:
  db:
    image: postgres:16.2-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io/necktral}/necktral-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/backend.Dockerfile.prod
    restart: unless-stopped
    working_dir: /app/backend
    env_file:
      - ./.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DB_HOST: db
      DB_PORT: "5432"
      DJANGO_SETTINGS_MODULE: config.settings.prod
      PYTHONPATH: /app/backend/src
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:8000/api/auth/bootstrap/status/ >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 3s
      retries: 30

  dash_analytics:
    image: ${IMAGE_REGISTRY:-ghcr.io/necktral}/necktral-dash:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/dash.Dockerfile
    restart: unless-stopped
    environment:
      DASH_BACKEND_BASE_URL: http://backend:8000/api
      DASH_URL_PREFIX: /analytics
      DASH_SESSION_SECRET: ${DASH_SESSION_SECRET:-dash-prod-secret-change-me}
      DASH_INTERNAL_PORT: "8050"
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "8050"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8050/analytics/health', timeout=2)\" || exit 1",
        ]
      interval: 10s
      timeout: 3s
      retries: 30

  web:
    image: ${IMAGE_REGISTRY:-ghcr.io/necktral}/necktral-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      dash_analytics:
        condition: service_healthy
    ports:
      - "80:80"

  # Herramientas opcionales (no PROD estricto)
  adminer:
    image: adminer:4.8.1
    restart: unless-stopped
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata_prod:
